version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-me-to-random}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-me-too}
      - DB_CLIENT=${DB_CLIENT:-better-sqlite3}
      - DATABASE_URL=${DATABASE_URL:-}
    volumes:
      - server_data:/app/server/data
      - uploads_data:/app/server/uploads
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - client_dist:/usr/share/nginx/html:ro
    depends_on:
      - server
    restart: unless-stopped

  client-builder:
    build:
      context: .
      dockerfile: Dockerfile.client
    volumes:
      - client_dist:/app/client/dist
    command: sh -c "npm run build && cp -r dist/* /output/"
    profiles:
      - build

volumes:
  server_data:
  uploads_data:
  client_dist:
